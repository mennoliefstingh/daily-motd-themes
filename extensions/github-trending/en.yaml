# GitHub Trending extension for daily-motd
# Requires: python3 (stdlib only, no pip needed)
# Uses the GitHub Search API — no token required for basic use.
# Shows the top 3 trending repositories of the past 7 days.
#
# Install: copy this file to ~/.config/daily-motd/extensions/
# Then run: daily-motd --source "GitHub Trending"

name: GitHub Trending
type: command
color: "#24292f"
command: |
  python3 - <<'EOF'
import datetime, urllib.request, json, sys

week_ago = (datetime.date.today() - datetime.timedelta(days=7)).isoformat()
url = (
    "https://api.github.com/search/repositories"
    f"?q=created:>{week_ago}&sort=stars&order=desc&per_page=3"
)
req = urllib.request.Request(
    url,
    headers={"Accept": "application/vnd.github+json", "User-Agent": "daily-motd"}
)
try:
    data = json.loads(urllib.request.urlopen(req, timeout=10).read())
except Exception as e:
    print(f"Could not fetch GitHub trending: {e}", file=sys.stderr)
    sys.exit(1)

lines = ["🔥 Trending on GitHub this week\n"]
for r in data.get("items", [])[:3]:
    desc = r.get("description") or "No description"
    lang = r.get("language") or "Unknown"
    stars = r.get("stargazers_count", 0)
    lines.append(f"⭐ {stars:,}  {r['full_name']}  [{lang}]")
    lines.append(f"   {desc}")
print("\n".join(lines))
EOF
cache: eod
timeout: 15s
fallback: "Could not fetch GitHub trending today."
