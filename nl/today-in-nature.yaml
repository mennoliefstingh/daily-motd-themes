# today-in-nature theme (Dutch)
# Source: Marcus Coates
# License: CC BY-NC-SA 3.0 NL

name: Vandaag in de Natuur

messages:
  01/01: Dassen liggen diep onder de grond te slapen.
  02/01: Heggenmusjes beginnen te zingen.
  03/01: De kastanjebruine uil vliegt 's nachts rond.
  04/01: De glanskop begint te zingen.
  05/01: Bevers knagen aan wilgenbast om hun honger te stillen.
  06/01: Konijnen knagen aan de bast van hulst en andere struiken als het streng vriest.
  07/01: Holenduiven laten zich horen.
  08/01: Kleine watersalamanders beginnen te paren als het zacht genoeg is.
  09/01: Konijnen beginnen aan het voortplantingsseizoen.
  10/01: De kleine bonte specht roffelt soms al.
  11/01: Paarse dovenetel bloeit hier en daar al.
  12/01: De gevlamde wintervlinder vliegt nu tot eind april.
  13/01: Gewoon sterrenmos vormt voortplantingsorganen.
  14/01: Winterjuffers vliegen rond op warme dagen.
  15/01: De eerste gele narcissen bloeien.
  16/01: De eerste gorzen beginnen te zingen.
  17/01: Donkergroene kussentjes gaffeltandmos groeien op zandige oevers en boomstammen.
  18/01: De koolmees is nu de luidste zanger.
  19/01: Sleedoornpages leggen eitjes in sleedoornstruiken.
  20/01: Het paringsseizoen van de bever begint.
  21/01: Boomleeuweriken zingen.
  22/01: Zwarte knoopzwam groeit op dode takken.
  23/01: De mestkever verschijnt.
  24/01: De eerste sneeuwklokvellen komen boven de grond uit.
  25/01: Vroege veldleeuweriken beginnen te zingen.
  26/01: Ruige dwergvleermuizen vliegen rond als het niet te koud is.
  27/01: Het paringsseizoen van de haas begint en duurt tot diep in de zomer.
  28/01: De eerste roodborstjes beginnen hun nest te bouwen.
  29/01: Wintermuggen zijn overal.
  30/01: De eerste sneeuwklokjes beginnen te bloeien.
  31/01: Regenwormen liggen boven de grond.
  01/02: Kleine vossen (vlinders) komen uit hun winterslaap.
  02/02: Groenlingen verlaten de groep en gaan alleen verder.
  03/02: Mollen maken hun ondergrondse nesten klaar voor de jongen.
  04/02: Boomkruipers beginnen hun voorjaarsroep.
  05/02: Bosuilen roepen bij schemering.
  06/02: Appelvinkjes eten hulstbessen.
  07/02: Merels zingen bij het vallen van de avond.
  08/02: De winterjasmijn staat vol in bloei.
  09/02: Turkse tortels koeren luid in de ochtend.
  10/02: Het eerste glimmerinktzwammetje verschijnt op dode loofbomen.
  11/02: Grote bonte spechten roffelen om hun territorium af te bakenen.
  12/02: Mannetjesmollen graven lange tunnels op zoek naar een partner en gooien flinke heuvels op.
  13/02: Dassen werpen hun jongen.
  14/02: Houtsnippen maken baltsvluchten om hun territorium te markeren.
  15/02: De geelgors begint zijn kenmerkende schelle liedje te zingen.
  16/02: Kerkuilen paren.
  17/02: Dagpauwogen en citroenvlinders komen uit hun winterslaap.
  18/02: De eerste sleutelbloemen verschijnen.
  19/02: De fuut begint aan zijn spiegeldans.
  20/02: Zalmen trekken de rivieren af op weg naar zee.
  21/02: Kikkers zijn druk aan het paren en produceren kikkerdril.
  22/02: Vinken beginnen te zingen.
  23/02: Kleine maagdenpalm bloeit met felblauwe bloemen.
  24/02: Goudhanen beginnen hun bijna onhoorbaar hoge getsjilp.
  25/02: Adders komen uit hun winterslaap.
  26/02: Rotganzen vertrekken naar de arctische eilanden.
  27/02: Vroeg broedende blauwe reigers hebben al eieren.
  28/02: Hazelwormen worden weer actief na de winter.
  29/02: ""
  01/03: De meeste bosuilen hebben hun eieren gelegd.
  02/03: Bosanemonen bloeien in het bos.
  03/03: De eerste koninginnen van de wesp komen uit hun winterslaap.
  04/03: Wilgen en dotterbloemen staan in bloei.
  05/03: "Wulpen maken baltsvluchten: steil omhoog en dan glijdend naar beneden terwijl ze zingen."
  06/03: Grote lijsters broeden.
  07/03: De sleedoorn bloeit.
  08/03: Vroege zwanen beginnen aan hun nest.
  09/03: De eerste speenkruidbloemen verschijnen.
  10/03: Hazenrammen vechten rechtop op hun achterpoten — het beroemde 'boksen'.
  11/03: De eerste generatie citroenvlinders begint te vliegen.
  12/03: Mannelijke taxusbomen verspreiden grote hoeveelheden stuifmeel.
  13/03: Het groot koolwitje vliegt rond.
  14/03: Sperwers cirkelen boven hun territorium — alleen in deze tijd van het jaar.
  15/03: Bruine kikkers komen tevoorschijn.
  16/03: Zwarte mieren openen de ingang van hun nest en gaan bovengronds op zoek naar voedsel.
  17/03: De eerste bonte zandoogjes vliegen rond.
  18/03: Bruine kikkers beginnen te kwaken om vrouwtjes te lokken.
  19/03: "Winterkoninkjes zingen hoger in de bomen, hun stem draagt verder."
  20/03: De eerste jonge boommarters worden geboren.
  21/03: De eerste salamanders keren terug naar het water.
  22/03: De rozemarijn is begonnen met bloeien.
  23/03: De eerste bladeren van de paardenkastanje vouwen open.
  24/03: Padden paren en leggen eieren.
  25/03: IJsvogels zoeken naar nestholtes.
  26/03: De eerste hazelaarsblaadjes verschijnen.
  27/03: ""
  28/03: Magnolia's bloeien nog vóór de eerste bladeren verschijnen.
  29/03: Tapuiten zijn terug — een van de eerste langeafstandstrekkers.
  30/03: Ransuilen broeden.
  31/03: "Kraaien, kauwen, eksters en roeken bouwen of herstellen hun nesten."
  01/04: Het paringsseizoen van de adder is begonnen; de mannetjes dansen en vechten om indruk te maken.
  02/04: De eerste tjiftjaffen zijn terug en zingen hun eigen naam.
  03/04: De eerste wilde zwijntjes worden geboren.
  04/04: Het eerste lied van de fitis klinkt.
  05/04: Kikkervisjes wemelen in vijvers en poelen.
  06/04: Sperwers en torenvalken broeden.
  07/04: De eerste nachtegaal is terug.
  08/04: De meeste buizerds hebben hun eerste ei gelegd.
  09/04: Het oranjetipje vliegt rond.
  10/04: Ringslangen paren.
  11/04: Koekoeksmannetjes arriveren uit Afrika bezuiden de Sahara en roepen hun naam.
  12/04: Bevers krijgen hun eerste jongen.
  13/04: Essen staan in bloei.
  14/04: Gele kwikstaarten zijn terug uit hun overwinteringsgebied.
  15/04: Egels komen uit hun winterslaap.
  16/04: De kleine vos en de gehakkelde aurelia zijn op het hoogtepunt van hun vliegtijd.
  17/04: Jonge wilde eendjes zijn uitgekomen en zwemmen al rond.
  18/04: Wilde appelbomen bloeien.
  19/04: Grijze eekhoorns maken hun nesten (drieën) klaar.
  20/04: Gele dovenetel bloeit.
  21/04: "Oeverlopers, bonte vliegenvangers, sprinkhaanzangers en vele andere vogels zijn terug."
  22/04: De bladeren van de zomereik vouwen open.
  23/04: De meidoorn begint te bloeien.
  24/04: De fluiter is gearriveerd om de zomer door te brengen.
  25/04: "Kool- en pimpelmezen zitten op eieren."
  26/04: "Zeldzame zomertortels die de jacht op Malta hebben overleefd, komen aan."
  27/04: De eerste bloemen van de paardenkastanje verschijnen.
  28/04: De kleine karekiet is in het land.
  29/04: De eerste gierzwaluw is gearriveerd en blijft honderd dagen.
  30/04: Het winterkoninkje bouwt meerdere nesten; het vrouwtje kiest er één uit.
  01/05: Koekoeksvrouwtjes arriveren.
  02/05: "De eerste nachtzwaluwen komen aan, snorrend en met de vleugels klappend in de schemering."
  03/05: Wilde hyacinten staan in volle bloei in het bos.
  04/05: Jonge bosuilen roepen soms al vanuit het ei.
  05/05: De eerste jonge futen zijn uitgekomen en worden op de rug van hun ouders meegevoerd.
  06/05: Grauwe vliegenvangers komen aan uit Afrika.
  07/05: De eerste wielewalen zijn te horen.
  08/05: Eiken bloeien en produceren veel stuifmeel.
  09/05: Oranjetipjes en boomblauwtjes vliegen rond.
  10/05: "De laatste zomergasten arriveren: gierzwaluwen gieren door de lucht."
  11/05: Margriet bloeit.
  12/05: "Vlinders in overvloed: bont zandoogje, argusvlinder, klein geaderd witje en bruin dikkopje vliegen."
  13/05: Schuimbeestjes kruipen uit hun 'koekoeksspuug'.
  14/05: Jonge mollen worden geboren.
  15/05: Jonge palingen trekken vanuit zee de rivieren op.
  16/05: Waterdrieblad en gele lis bloeien langs de vijverrand.
  17/05: De lucht is vol merelgezang.
  18/05: Essen lopen uit — een van de laatste bomen in het voorjaar.
  19/05: Koninginnepages vliegen rond.
  20/05: De eerste edelhertkalfjes van het jaar worden geboren.
  21/05: Jonge koolmezen verlaten hun nest.
  22/05: De meeste gierzwaluwen hebben een ei gelegd onder losse dakpannen.
  23/05: Grote lijsters stoppen met zingen — hun werk zit erop.
  24/05: Vossenwelpen komen uit hun hol en spelen bovengronds.
  25/05: "Gevlekte orchis, groot kaasjeskruid en rolklaver staan in bloei."
  26/05: De felgekleurde grote beer (nachtvlinder) vliegt rond.
  27/05: Kolibrievlinders zoeken nectar.
  28/05: De eerste kokerjuffers verschijnen.
  29/05: Roodborstjes hebben hun tweede legsel; de jongen van het eerste zijn uitgevlogen.
  30/05: De weilanden staan vol boterbloemen.
  31/05: De giftige veldhondstong bloeit.
  01/06: De meeste boomvalken hebben een ei gelegd.
  02/06: De vliegtijd van de bergnachtorchis begint.
  03/06: "Koekoeksvrouwtjes bezoeken nesten: ze halen een ei weg en leggen er een eigen ei voor terug."
  04/06: Wilde hondsrozen bloeien.
  05/06: Egels werpen hun jongen.
  06/06: De extreem giftige wolfskers bloeit.
  07/06: Moerasspirea bloeit met grote witte pluimen in vochtige weilanden.
  08/06: Dolle kervel staat in bloei.
  09/06: Het groene eikenbladrollerje zoekt geschikte blaadjes om tot eicocons te rollen.
  10/06: Watersnippen baltsen door omlaag te vliegen en een 'bleatend' geluid te maken met hun staartveren.
  11/06: De meeste kleine karekieten hebben hun eieren gelegd.
  12/06: "Klaprozen bloeien in velden, braakliggende terreinen en langs wegen."
  13/06: Vliegende herten (vliegend hert) verschijnen.
  14/06: Jonge boerenzwaluwen zijn groot genoeg om het nest te verlaten.
  15/06: De eerste reuzenbovist verschijnt in weilanden.
  16/06: Grote en kleine vossen (vlinders) zijn te zien.
  17/06: Vleermuizen zijn volop actief en vangen 's nachts duizenden insecten.
  18/06: "Elfenbankjes verschijnen opeens in weilanden, soms in heksenkringen."
  19/06: "Jonge dwergmuizen liggen in hun gewoven grasnesten, hangend tussen de halmen."
  20/06: Merels stoppen met broeden en hun hartstochtelijke gezang verstilt.
  21/06: De eerste jonge padjes kruipen het droge land op.
  22/06: Kleine dikkopjes (vlinders) vliegen rond.
  23/06: Gewone zeehonden werpen hun jongen op zandplaten in zee.
  24/06: Grote dazen verschijnen.
  25/06: De koekoek stopt langzaam met het roepen van zijn naam.
  26/06: "De keizersmantel vliegt met zijn zwart-oranje schaakbordvleugels."
  27/06: Vinken stoppen met zingen.
  28/06: Bruinvissen zijn aan het paren; hun jongen worden elf maanden later geboren.
  29/06: Ringslangen leggen hun eieren in dampende mesthopen en composthopen.
  30/06: Olifantsvlinders bezoeken kamperfoeliebloemen voor bestuiving.
  01/07: Glimwormen verschijnen.
  02/07: De eerste wespen gaan op zoek naar iets zoets voor hun larven.
  03/07: Wilgenroosje bloeit.
  04/07: IJzerhard bloeit.
  05/07: De bruine glazenmaker en de houtpantserjuffer vliegen rond.
  06/07: Vleermuisvrouwtjes geven hun jongen de borst.
  07/07: De meeste volwassen koekoeken zijn vertrokken naar Afrika.
  08/07: Grote weerschijnvlinders vliegen bij wilgen.
  09/07: Jonge eksters lopen achter hun ouders aan en bedelen om eten.
  10/07: Reeën beginnen te paren.
  11/07: "Keizersmantel-vlinders verschijnen."
  12/07: Zonnedauw bloeit in veenmos.
  13/07: De rode bessen van de lijsterbes rijpen.
  14/07: Het meeste waterkoninginnedoorn (blauwe breedscheenjuffer) vliegt rond.
  15/07: Op zonnige plekken zijn de eerste bramen rijp.
  16/07: Ottervrouwtjes werpen hun jongen.
  17/07: Wollegras en beenbreek bloeien.
  18/07: "Bruin zandoogje, keizersmantel en het pimpernelblauwtje vliegen rond."
  19/07: Zanglijsters stoppen met zingen.
  20/07: Rozenbedeguars verschijnen op wilde rozensoorten.
  21/07: De eerste cantharellen verschijnen in beukenbossen.
  22/07: "Het vogelzangseizoen is grotendeels voorbij, maar veldleeuweriken en geelgorzen zingen nog."
  23/07: Wespen zijn overal.
  24/07: De grote vuurvlinder vliegt rond.
  25/07: "Oranje luzernevlinders verschijnen op klaver- en luzernevelden."
  26/07: "Gewone zeehonden beginnen hun balts- en paringsritueel."
  27/07: Paardenbijters (libellen) vliegen rond.
  28/07: Kleine dikkopjes vliegen rond.
  29/07: Waterscheerling bloeit. De wortels zijn zeer giftig.
  30/07: Kamperfoeliebessen beginnen te rijpen.
  31/07: Wolfspoot bloeit in natte gebieden.
  01/08: Het tweede legsel boerenzwaluwen vliegt uit.
  02/08: Rupsen van de avondpijlstaart zijn volgroeid.
  03/08: Het kleine roodoogjuffer vliegt rond.
  04/08: De gewone aardappelbovist wordt aangevallen door de parasierende boleet.
  05/08: Klimopklokje bloeit.
  06/08: Vingerhoedskruid staat overal.
  07/08: Geelgorzen stoppen met zingen.
  08/08: Jonge kikkers zijn uitgewaaierd en foerageren op insecten in het gras.
  09/08: Succisa (blauwe knoop) bloeit nog steeds.
  10/08: Gierzwaluwen vertrekken naar Afrika.
  11/08: Kleine vossen (vlinders) vliegen rond.
  12/08: Jonge hazelwormen komen uit het ei.
  13/08: Het tweede legsel huiszwaluwen is uitgevlogen.
  14/08: Roodborstjes beginnen hun herfstzang.
  15/08: Mollen gooien hun jongen het nest uit.
  16/08: De blauwe glazenmaker vliegt rond.
  17/08: De houtpantserjuffer vliegt rond.
  18/08: Wollige kaardebol bloeit.
  19/08: Rupsen van de olifantsvlinder en de ligusterpijlstaart zijn bijna volgroeid.
  20/08: De citroenboleet verschijnt op zandgrond onder eiken en beuken.
  21/08: Jonge vleermuizen beginnen zelf insecten te vangen en hebben geen moedermelk meer nodig.
  22/08: Gladde slangen baren levende jongen.
  23/08: Gevleugelde mieren verschijnen in zwermen uit mierennesten.
  24/08: Kieviten vormen groepen voor hun herfsttrek.
  25/08: Alleen en voor het eerst vliegend vertrekken jonge koekoeken naar Afrika.
  26/08: De hoorn des overvloeds (paddenstoel) verschijnt in bossen.
  27/08: Het adonisblauwtje vliegt rond.
  28/08: Rupsen van het kleine nachtpauwoog eten van de heide.
  29/08: Volwassen spitsmuizen zijn aan het eind van hun leven en sterven van uitputting.
  30/08: De eerste vlierbessen zijn rijp en worden opgegeten door houtduiven.
  31/08: Dagpauwogen vliegen rond of rusten uit.
  01/09: Doodshoofdvlinders vliegen rond.
  02/09: Overal zijn glimmerinktzwammen te vinden.
  03/09: Bramen beginnen te rijpen.
  04/09: Jonge rugstreeppadden verlaten het water.
  05/09: Zijdeknopgallen verschijnen op de onderkant van eikenbladeren.
  06/09: Grillig gevormde knoppergallen vallen uit de eiken.
  07/09: De laatste aardbeivlinders vliegen nog rond.
  08/09: Wespkeverlarven verschijnen uit ondergrondse wespennesten.
  09/09: Parasolzwammen verschijnen in weilanden en langs wegkanten.
  10/09: Langpootmuggen zijn overal.
  11/09: De eerste kastanjes zijn rijp en vallen uit de bomen.
  12/09: "Geschubde inktzwammen verschijnen op omgewerkte, voedselrijke grond."
  13/09: De aarddistel bloeit nog steeds.
  14/09: Linden beginnen hun bladeren te verliezen.
  15/09: Edelhertbokken beginnen aan de bronst.
  16/09: IJsvogels zijn nu vaak te zien.
  17/09: De eerste eikels vallen.
  18/09: Adelaarsvaren kleurt herfstachtig.
  19/09: Dassenberen maken hun burchten klaar voor meerdere vrouwtjes.
  20/09: De eerste boerenzwaluwen en huiszwaluwen beginnen hun trek naar het zuiden.
  21/09: Beukennootjes liggen nu volop in het bos.
  22/09: Klimop begint te bloeien.
  23/09: "Grote lijsters eten rijpe, oranje lijsterbessen."
  24/09: Kokerjuffers zwermen boven vijvers in de avond.
  25/09: "Zomertortels vertrekken om te overwinteren in West-Afrika."
  26/09: Kamperfoelie bloeit voor de tweede keer.
  27/09: "Valse truffels zijn te vinden in dennenbossen, nadat konijnen ze hebben opgegraven."
  28/09: Eikelmuis en eekhoorns leggen wintervoorraden aan.
  29/09: Granaatroze wasplaat verschijnt in weilanden en op gazons.
  30/09: "Trekkende gamma-uiltjes zijn op weg naar het zuiden."
  01/10: "Volwassen palingen trekken van binnenwateren naar zee, op weg naar hun paaigronden in de Sargassozee."
  02/10: "Veel bomen, waaronder beuken, kleuren in herfsttinten."
  03/10: "Rozenbottels, meidoornbessen en sleedoornbessen zijn nu rijp."
  04/10: Weidechampignons staan in opvallende heksenkringen in weilanden en op gazons.
  05/10: Bronstende edelherten vechten met hun gewei om de hindes.
  06/10: Vliegenzwammen verschijnen onder berken en andere bomen.
  07/10: Spreeuwen beginnen in enorme zwermen te overnachten.
  08/10: De laatste vluchten van het klein geaderd witje voordat het als pop overwintert.
  09/10: Wespenkoninginnen gaan in winterslaap.
  10/10: Merels eten afgevallen appels.
  11/10: "Lieveheersbeestjes gaan in winterslaap, vaak in huizen."
  12/10: "Bomen verliezen hun blad, maar eik en es zijn nog groen."
  13/10: Grote sponszwam verschijnt aan de voet van grove dennenstammen.
  14/10: Vinken en barmsijzen zingen soms op mooie ochtenden.
  15/10: Winterkoninkjes beginnen hun herfstzang.
  16/10: De laatste huiszwaluwen en boerenzwaluwen vertrekken naar Afrika.
  17/10: "Kornoelje-bladeren kleuren prachtig rood."
  18/10: "Bij schemering laten merels hun korte, hoge alarmroep horen."
  19/10: Sommige jonge houtduiven verlaten nu pas het nest.
  20/10: Amfibieën beginnen zich terug te trekken in hun winterverblijf.
  21/10: "De braakrussula verschijnt op vochtige, zure grond."
  22/10: De Amerikaanse eik kleurt opvallend rood.
  23/10: De eerste kramsvogels komen aan uit het hoge noorden.
  24/10: "Rotganzen keren terug uit hun noordelijke broedgebieden, met hun jongen."
  25/10: "Hazelwormen gaan in winterslaap, verscholen in humus en ruig gras."
  26/10: De eerste houtsnippen arriveren uit Finland en Rusland om hier te overwinteren.
  27/10: Gehakkelde aurelia's zijn gestopt met vliegen voor dit jaar.
  28/10: De berkenbladeren hebben hun herfstkleuren aangenomen.
  29/10: Dagpauwogen stoppen met vliegen nu de herfst vordert.
  30/10: Hazelmuis gaat in winterslaap tot april.
  31/10: Vrijwel alle vlinders zijn gestopt met vliegen door de kou.
  01/11: Grote lijsters beginnen weer te zingen vanuit de boomtoppen.
  02/11: "De grootoorvleermuis begint te overwinteren in bomen, holle muren, grotten en mijnen."
  03/11: Het gras stopt met groeien.
  04/11: Ontelbare dwergspinnen bedekken het gras met zijdedraden.
  05/11: De herfstkleuring is rond deze tijd meestal op zijn mooist.
  06/11: "Zeemeerminbeurzen met haaien- of rogeieren spoelen aan op het strand."
  07/11: "Laatvliegers overwinteren in spouwmuren, onder dakpannen en in ongebruikte schoorstenen."
  08/11: Zalmen trekken de rivieren op vanuit zee om stroomopwaarts te paaien.
  09/11: De laatste atalanta's vliegen nog rond.
  10/11: Duizenden wilde ganzen zijn terug uit hun zomerse broedgebieden in het Noordpoolgebied.
  11/11: Volwassen spitsmuizen sterven van uitputting; de jongen moeten de winter alleen zien te overleven.
  12/11: Kikkers overwinteren in de onbevroren modderlaag op de bodem van vijvers en poelen.
  13/11: Geweizwam staat volop op oude stronken.
  14/11: De kleurige boterwasplaat verschijnt in weilanden.
  15/11: De spuugspinnende spin Scytodes thoracica gaat 's nachts op jacht.
  16/11: Adders en ringslangen gaan in winterslaap.
  17/11: Egels gaan in winterslaap tot april.
  18/11: Kieviten foerageren in groepen op akkers.
  19/11: "Bruine knoopzwam groeit op dode berken- en eikentakken."
  20/11: Af en toe verschijnt er nog een citroenvlinder.
  21/11: Eekhoorns trekken zich terug in hun winterverblijf.
  22/11: De meeste nachtvlinders beginnen als pop te overwinteren tussen gevallen bladeren.
  23/11: Ransuilen vormen gemeenschappelijke slaapplaatsen.
  24/11: Groenlingen verzamelen zich in groepen om samen te overwinteren.
